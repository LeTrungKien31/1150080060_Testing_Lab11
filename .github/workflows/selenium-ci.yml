name: Selenium CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Cho phép bấm chạy bằng tay trên GitHub

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Lỗi 1 browser thì browser kia vẫn chạy tiếp
      matrix:
        browser: [chrome, firefox]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # Cache thư viện để chạy nhanh hơn

    - name: Run Selenium Tests
      # Truyền tên browser từ matrix vào biến của Maven
      run: mvn test -Dbrowser=${{ matrix.browser }} -DsuiteXmlFile=testng-smoke.xml

    - name: Upload Test Results
      if: always() # Luôn upload dù test pass hay fail
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.browser }}
        path: |
          target/surefire-reports/
          screenshots/